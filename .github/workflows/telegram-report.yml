name: Telegram heat-risk report

"on":
  schedule:
    - cron: "15 1,2,3,4,5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: telegram-heat-risk-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Download model artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/model-artifacts artifacts
          gh release download model-artifacts \
            --pattern model-artifacts.zip \
            --dir /tmp/model-artifacts \
            --clobber
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          root = Path(".").resolve()
          with ZipFile("/tmp/model-artifacts/model-artifacts.zip") as archive:
              for member in archive.infolist():
                  name = member.filename.replace("\\", "/")
                  target = (root / name).resolve()
                  if not target.is_relative_to(root):
                      raise RuntimeError(f"Unsafe zip member path: {member.filename}")
                  if member.is_dir():
                      target.mkdir(parents=True, exist_ok=True)
                      continue
                  target.parent.mkdir(parents=True, exist_ok=True)
                  with archive.open(member) as source, target.open("wb") as dest:
                      dest.write(source.read())
          PY

      - name: Build report
        run: uv run rksi-telegram-report --output artifacts/telegram_report.md --hours 4

      - name: Commit updated METAR log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metar.txt
          if git diff --cached --quiet; then
            echo "No new METAR lines to commit."
          else
            git commit -m "Update METAR log"
            git pull --rebase
            git push
          fi

      - name: Send Telegram report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/send_telegram_report.mjs artifacts/telegram_report.md
